name: Release & Update README

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Chuck Norris Joke
        id: joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "joke=$JOKE" >> $GITHUB_OUTPUT

      - name: Determine Version
        id: version
        run: echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Get Commit Message
        id: pr_title
        run: |
          MSG=$(git log -1 --pretty=%B | head -n 1)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          sed -i '/## Latest Release Info/,$d' README.md
          echo -e "\n## Latest Release Info" >> README.md
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> README.md
          echo "- **Commit/PR:** ${{ steps.pr_title.outputs.msg }}" >> README.md
          echo "- **Chuck Norris Joke:** ${{ steps.joke.outputs.joke }}" >> README.md

      - name: Commit and Push README
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README with release info [skip ci]" || echo "No changes to commit"
          git push

      - name: Create Tag & GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Що нового
            - Останній коміт: ${{ steps.pr_title.outputs.msg }}
            - Автоматичний жарт: ${{ steps.joke.outputs.joke }}
